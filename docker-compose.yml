services:
  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runvs-admin-backend
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-runcrew}:${POSTGRES_PASSWORD:-runcrew_password}@runvs-db:5432/${POSTGRES_DB:-runcrew}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-admin-dev-secret-change-me}
      CORS_ORIGINS: '["http://localhost:5173","https://admin.runvs.run","https://*.vercel.app"]'
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    restart: unless-stopped
    networks:
      - runvs-net

networks:
  runvs-net:
    external: true
